# Render.com deployment for atrovia.co
#
# NOTE: this is a Node WEB SERVICE, not a static site. The site needs server
# code for Stripe Checkout + the webhook, which a Render static site cannot run.
# server.js (Express) serves the static pages AND the /api routes.
#
# Set the secret values in the Render dashboard (Environment tab). They are
# marked sync:false so they are NOT stored in this repo.
services:
  - type: web
    name: atrovia-co-site
    runtime: node
    # Starter (or higher) avoids free-tier cold starts, which would drop or
    # delay Stripe webhooks and slow down checkout. Change if you accept that.
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Public base URL of the deployed site (e.g. https://atrovia.co). Used to
      # build Stripe success/cancel URLs. Set to the Render URL first, then your domain.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      # Stripe (TEST keys to start; swap to live keys to go live)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ATRIUM
        sync: false
      - key: STRIPE_PRICE_KOVA
        sync: false
      - key: STRIPE_PRICE_BOTH
        sync: false
      # Resend (email)
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: INTERNAL_NOTIFY_EMAIL
        sync: false
      # Provisioning hook (optional — leave unset during beta/manual provisioning)
      - key: PROVISION_WEBHOOK_URL
        sync: false
      - key: PROVISION_WEBHOOK_SECRET
        sync: false
